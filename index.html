  <style>
    /* ── Variables ── */
    :root {
      --bg:           #0d2a2a;
      --surface:      rgba(10, 40, 40, 0.72);
      --surface-2:    rgba(15, 55, 55, 0.82);
      --border:       rgba(78, 210, 195, 0.22);
      --gold:         #f0d020;
      --gold-light:   #f8e870;
      --gold-dim:     #8a7800;
      --ivory:        #e8f8f5;
      --ivory-dim:    #7ab8b0;
      --danger:       #e84040;
      --danger-glow:  rgba(232,64,64,.35);
      --active-glow:  rgba(78,210,195,.18);
      --white-player: #e8f8f5;
      --black-player: #0d2a2a;
      --radius:       4px;
      --transition:   .25s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--ivory);
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");

      z-index: 999;
      opacity: .6;
    }

    /* ── Board pattern ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(45deg, rgba(78,210,195,.07) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(78,210,195,.07) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(78,210,195,.07) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(78,210,195,.07) 75%);

      background-position: 0 0, 0 40px, 40px -40px, -40px 0px;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 10;
      width: min(96vw, 640px);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    header {
      text-align: center;
      padding-bottom: 24px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 400;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: .85;
    }
    header p {
      font-size: .75rem;
      letter-spacing: .2em;
      color: var(--ivory-dim);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Clock Cards ── */
    .clocks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .clock-card {
      background: rgba(8, 38, 38, 0.90);
      padding: 36px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      position: relative;
      transition: background var(--transition), box-shadow var(--transition);
      min-height: 220px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .clock-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--transition);
    }

    /* White player */
    .clock-card.player-white { border-right: 1px solid var(--border); }
    .clock-card.player-white::before { background: var(--active-glow); }
    .clock-card.player-white.active {
      background: var(--surface-2);
      box-shadow: inset 0 0 40px rgba(78,210,195,.10);
    }
    .clock-card.player-white.active::before { opacity: 1; }

    /* Black player */
    .clock-card.player-black::before { background: var(--active-glow); }
    .clock-card.player-black.active {
      background: var(--surface-2);
      box-shadow: inset 0 0 40px rgba(78,210,195,.10);
    }
    .clock-card.player-black.active::before { opacity: 1; }

    /* Low time warning */
    .clock-card.warning .time-display { color: var(--danger) !important; animation: pulse 1s ease-in-out infinite; }
    .clock-card.warning { box-shadow: inset 0 0 40px var(--danger-glow) !important; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .65; }
    }

    /* Active indicator bar */
    .clock-card .active-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #4ed2c3, transparent);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .clock-card.active .active-bar { opacity: 1; }

    .player-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: .7rem;
      font-weight: 400;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--ivory-dim);
    }

    .player-icon {
      width: 32px;
      height: 32px;
      opacity: .6;
    }

    .time-display {
      font-family: 'DM Mono', monospace;
      font-size: clamp(2.4rem, 9vw, 4rem);
      font-weight: 300;
      color: var(--ivory);
      letter-spacing: .04em;
      transition: color var(--transition);
      line-height: 1;
    }

    .clock-card.active .time-display { color: var(--gold-light); }

    .move-count {
      font-size: .7rem;
      letter-spacing: .2em;
      color: var(--ivory-dim);
      font-weight: 300;
    }

    /* ── Controls ── */
    .controls {
      margin-top: 3px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn {
      font-family: 'Cormorant Garamond', serif;
      font-size: .75rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ivory-dim);
      padding: 9px 20px;
      border-radius: var(--radius);
      transition: all var(--transition);
    }
    .btn:hover {
      border-color: var(--gold-dim);
      color: var(--gold-light);
      background: rgba(78,210,195,.08);
    }

    .btn-primary {
      border-color: var(--gold-dim);
      color: var(--gold);
      padding: 9px 32px;
    }
    .btn-primary:hover {
      background: rgba(78,210,195,.15);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ivory-dim);
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
      transition: background var(--transition), box-shadow var(--transition);
    }
    .status-dot.running {
      background: #4ed2c3;
      box-shadow: 0 0 8px var(--gold);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.4} }

    /* ── Config Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,25,25,.88);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: min(92vw, 480px);
      padding: 32px;
      transform: translateY(20px);
      transition: transform .3s ease;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 1.3rem;
      letter-spacing: .1em;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .modal p.modal-sub {
      font-size: .75rem;
      letter-spacing: .15em;
      color: var(--ivory-dim);
      text-transform: uppercase;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .field-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--ivory-dim);
    }
    .field input, .field select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--ivory);
      font-family: 'DM Mono', monospace;
      font-size: .95rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color var(--transition);
      /* -webkit-appearance: none;az */
    }
    .field input:focus, .field select:focus {
      border-color: var(--gold-dim);
    }
    .field select option { background: var(--surface-2); }

    .presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .preset-btn {
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      letter-spacing: .05em;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: transparent;
      color: var(--ivory-dim);
      cursor: pointer;
      transition: all var(--transition);
    }
    .preset-btn:hover {
      border-color: var(--gold-dim);
      color: var(--gold-light);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* ── End Screen ── */
    .end-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s ease;
    }
    .end-screen.show {
      opacity: 1;
      pointer-events: all;
    }
    .end-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: 700;
      color: var(--gold);
      text-align: center;
      letter-spacing: .05em;
    }
    .end-screen p {
      color: var(--ivory-dim);
      font-size: 1rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      text-align: center;
    }
    .end-screen .btn-primary { margin-top: 8px; }

    /* ── Divider ornament ── */
    .ornament {
      text-align: center;
      color: var(--gold-dim);
      font-size: 1.2rem;
      letter-spacing: .5em;
      padding: 8px 0 0;
      opacity: .6;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .clock-card { min-height: 160px; padding: 24px 16px 20px; }
      .controls { padding: 12px 12px; gap: 6px; }
      .btn { padding: 8px 12px; }
      .btn-primary { padding: 8px 20px; }
    }
  </style>
</head>
<body>
<div class="bg-image"></div>

<!-- ── Main App ── -->
<div class="wrapper">
  <header>
    <h1>♟ Chess Clock</h1>
    <p>Reloj de Ajedrez</p>
  </header>

  <div class="clocks">
    <!-- White Player -->
    <div class="clock-card player-white" id="card-white" onclick="handleClockTap('white')">
      <div class="active-bar"></div>
      <div class="player-label">Blancas</div>
      <svg class="player-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="18" r="10" stroke="#f0ead2" stroke-width="2.5"/>
        <path d="M20 48 C20 34 44 34 44 48" stroke="#f0ead2" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M32 8 L32 4 M28 10 L25 7 M36 10 L39 7" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="time-display" id="time-white">10:00</div>
      <div class="move-count" id="moves-white">0 jugadas</div>
    </div>

    <!-- Black Player -->
    <div class="clock-card player-black" id="card-black" onclick="handleClockTap('black')">
      <div class="active-bar"></div>
      <div class="player-label">Negras</div>
      <svg class="player-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="18" r="10" stroke="#888" stroke-width="2.5"/>
        <path d="M20 48 C20 34 44 34 44 48" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M32 8 L32 4 M28 10 L25 7 M36 10 L39 7" stroke="#888" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="time-display" id="time-black">10:00</div>
      <div class="move-count" id="moves-black">0 jugadas</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <span id="status-indicator">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text" style="font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--ivory-dim)">Listo</span>
    </span>
    <button class="btn btn-primary" id="btn-main" onclick="togglePause()">Iniciar</button>
    <button class="btn" onclick="resetClock()">Reiniciar</button>
    <button class="btn" onclick="openConfig()">Config</button>
  </div>
  <div class="ornament">· · ♛ · ·</div>
</div>

<!-- ── Config Modal ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>Configuración</h2>
    <p class="modal-sub">Ajustar parámetros de partida</p>

    <p style="font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ivory-dim);margin-bottom:10px;">Presets rápidos</p>
    <div class="presets">
      <button class="preset-btn" onclick="applyPreset(1,0)">1 min</button>
      <button class="preset-btn" onclick="applyPreset(3,2)">3+2 (Blitz)</button>
      <button class="preset-btn" onclick="applyPreset(5,0)">5 min</button>
      <button class="preset-btn" onclick="applyPreset(10,0)">10 min</button>
      <button class="preset-btn" onclick="applyPreset(15,10)">15+10</button>
      <button class="preset-btn" onclick="applyPreset(30,0)">30 min</button>
      <button class="preset-btn" onclick="applyPreset(90,30)">Clásico</button>
    </div>

    <div class="field-group">
      <div class="field">
        <label>Minutos</label>
        <input type="number" id="cfg-minutes" min="0" max="180" value="10" />
      </div>
      <div class="field">
        <label>Segundos</label>
        <input type="number" id="cfg-seconds" min="0" max="59" value="0" />
      </div>
    </div>
    <div class="field-group">
      <div class="field">
        <label>Incremento (seg)</label>
        <input type="number" id="cfg-increment" min="0" max="60" value="0" />
      </div>
      <div class="field">
        <label>Modalidad</label>
        <select id="cfg-mode">
          <option value="fischer">Fischer (Bonus)</option>
          <option value="bronstein">Bronstein (Delay)</option>
          <option value="simple">Simple</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeConfig()">Cancelar</button>
      <button class="btn btn-primary" onclick="applyConfig()">Aplicar</button>
    </div>
  </div>
</div>

<!-- ── End Screen ── -->
<div class="end-screen" id="end-screen">
  <div style="font-size:3rem">♚</div>
  <h2 id="end-title">¡Tiempo agotado!</h2>
  <p id="end-subtitle">Ganan las blancas</p>
  <button class="btn btn-primary" onclick="resetClock()">Nueva Partida</button>
</div>

<script>
  // ── State ──
  const state = {
    times: { white: 0, black: 0 },
    moves: { white: 0, black: 0 },
    active: null,       // 'white' | 'black' | null
    running: false,
    finished: false,
    config: {
      minutes: 10,
      seconds: 0,
      increment: 0,
      mode: 'fischer'
    },
    bronstein: { white: 0, black: 0 },  // delay tracking
    _interval: null,
    _lastTick: null,
  };

  // ── Init ──
  function init() {
    const { minutes, seconds } = state.config;
    state.times.white = minutes * 60 + seconds;
    state.times.black = minutes * 60 + seconds;
    state.moves.white = 0;
    state.moves.black = 0;
    state.active = null;
    state.running = false;
    state.finished = false;
    state.bronstein = { white: 0, black: 0 };
    clearInterval(state._interval);
    render();
  }

  // ── Tick ──
  function tick() {
    if (!state.running || !state.active || state.finished) return;
    const now = Date.now();
    const delta = (now - state._lastTick) / 1000;
    state._lastTick = now;

    const p = state.active;

    if (state.config.mode === 'bronstein') {
      // Bronstein: delay counts up first, then real time decrements
      if (state.bronstein[p] < state.config.increment) {
        state.bronstein[p] = Math.min(state.bronstein[p] + delta, state.config.increment);
      } else {
        state.times[p] = Math.max(0, state.times[p] - delta);
      }
    } else {
      state.times[p] = Math.max(0, state.times[p] - delta);
    }

    if (state.times[p] <= 0) {
      state.times[p] = 0;
      endGame(p === 'white' ? 'black' : 'white');
    }
    render();
  }

  // ── Clock Tap ──
  function handleClockTap(player) {
    if (state.finished) return;

    // First tap starts the game — white taps first (black starts)
    if (!state.running && state.active === null) {
      // tap white → black starts; tap black → white starts
      const opponent = player === 'white' ? 'black' : 'white';
      state.active = opponent;
      state.running = true;
      state._lastTick = Date.now();
      state._interval = setInterval(tick, 50);
      render();
      return;
    }

    if (!state.running) return; // paused
    if (state.active !== player) return; // not your turn

    // Switch turn
    applyIncrement(player);
    state.moves[player]++;
    state.active = player === 'white' ? 'black' : 'white';
    state.bronstein[state.active] = 0; // reset delay for next player
    state._lastTick = Date.now();
    render();
  }

  function applyIncrement(player) {
    if (state.config.mode === 'fischer' && state.config.increment > 0) {
      state.times[player] += state.config.increment;
    }
  }

  // ── Toggle Pause ──
  function togglePause() {
    if (state.finished) return;
    if (!state.running && state.active === null) {
      // Start: white first (convention: white presses, black's clock starts)
      state.active = 'black';
      state.running = true;
      state._lastTick = Date.now();
      state._interval = setInterval(tick, 50);
      render();
      return;
    }
    state.running = !state.running;
    if (state.running) {
      state._lastTick = Date.now();
      state._interval = setInterval(tick, 50);
    } else {
      clearInterval(state._interval);
    }
    render();
  }

  // ── Reset ──
  function resetClock() {
    clearInterval(state._interval);
    document.getElementById('end-screen').classList.remove('show');
    init();
  }

  // ── End Game ──
  function endGame(winner) {
    state.running = false;
    state.finished = true;
    clearInterval(state._interval);
    const labels = { white: 'Blancas', black: 'Negras' };
    document.getElementById('end-title').textContent = '¡Tiempo agotado!';
    document.getElementById('end-subtitle').textContent = `Ganan las ${labels[winner]}`;
    setTimeout(() => document.getElementById('end-screen').classList.add('show'), 300);
  }

  // ── Format ──
  function formatTime(secs) {
    secs = Math.ceil(secs);
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  // ── Render ──
  function render() {
    ['white','black'].forEach(p => {
      const card = document.getElementById(`card-${p}`);
      const timeEl = document.getElementById(`time-${p}`);
      const movesEl = document.getElementById(`moves-${p}`);

      timeEl.textContent = formatTime(state.times[p]);
      movesEl.textContent = `${state.moves[p]} jugada${state.moves[p] !== 1 ? 's' : ''}`;

      card.classList.toggle('active', state.active === p && state.running);
      card.classList.toggle('warning', state.times[p] <= 30 && state.times[p] > 0);
    });

    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    const btn = document.getElementById('btn-main');

    if (state.finished) {
      dot.className = 'status-dot';
      txt.textContent = 'Finalizado';
      btn.textContent = 'Finalizado';
    } else if (state.running) {
      dot.className = 'status-dot running';
      txt.textContent = 'En juego';
      btn.textContent = 'Pausar';
    } else if (state.active !== null) {
      dot.className = 'status-dot';
      txt.textContent = 'Pausado';
      btn.textContent = 'Reanudar';
    } else {
      dot.className = 'status-dot';
      txt.textContent = 'Listo';
      btn.textContent = 'Iniciar';
    }
  }

  // ── Config Modal ──
  function openConfig() {
    if (state.running) togglePause();
    document.getElementById('cfg-minutes').value   = state.config.minutes;
    document.getElementById('cfg-seconds').value   = state.config.seconds;
    document.getElementById('cfg-increment').value = state.config.increment;
    document.getElementById('cfg-mode').value      = state.config.mode;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeConfig() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function applyConfig() {
    state.config.minutes   = parseInt(document.getElementById('cfg-minutes').value)   || 0;
    state.config.seconds   = parseInt(document.getElementById('cfg-seconds').value)   || 0;
    state.config.increment = parseInt(document.getElementById('cfg-increment').value) || 0;
    state.config.mode      = document.getElementById('cfg-mode').value;
    closeConfig();
    clearInterval(state._interval);
    init();
  }

  function applyPreset(mins, inc) {
    document.getElementById('cfg-minutes').value   = mins;
    document.getElementById('cfg-seconds').value   = 0;
    document.getElementById('cfg-increment').value = inc;
    if (inc > 0) document.getElementById('cfg-mode').value = 'fischer';
  }

  // Close modal on overlay click
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeConfig();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (document.getElementById('modal-overlay').classList.contains('open')) return;
    if (e.code === 'Space') { e.preventDefault(); if (state.active) handleClockTap(state.active); else togglePause(); }
    if (e.code === 'KeyR')  { e.preventDefault(); resetClock();  }
    if (e.code === 'KeyC')  { e.preventDefault(); openConfig();  }
    // Arrow keys to switch turns
    if (e.code === 'ArrowLeft')  handleClockTap('white');
    if (e.code === 'ArrowRight') handleClockTap('black');
  });

  // ── Boot ──
  init();
</script>
<footer>
  <p style="text-align:center;font-size:.65rem;color:var(--ivory-dim);padding:12px 0;">
    Hecho por <a href="https://github.com/elwinperdomo44-hash" target="_blank">Elwin</a>
  </p>
</footer>
</body>
</html>
